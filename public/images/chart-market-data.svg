<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" style="font-family:'Instrument Sans',sans-serif">
  <rect width="1200" height="480" fill="#EBF6FC" rx="20"/>

  <!-- Header -->
  <circle cx="40" cy="48" r="5" fill="#5BB5D8"/>
  <text x="54" y="53" font-size="11" font-weight="600" fill="#5BB5D8" letter-spacing="2">PORTLAND MARKET DATA — SOURCE: RMLS</text>
  <text x="40" y="90" font-size="28" font-weight="800" fill="#141414" letter-spacing="-0.5">The Portland Market, By the Numbers.</text>
  <text x="40" y="116" font-size="14" fill="#505050">Portland real estate moved through pandemic demand, rate correction, and stabilization — all in four years.</text>

  <!-- Chart background card -->
  <rect x="40" y="136" width="1120" height="220" fill="white" rx="14" stroke="#C4E4F2" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="80" y1="165" x2="1120" y2="165" stroke="#C4E4F2" stroke-width="1" stroke-dasharray="5,7"/>
  <line x1="80" y1="210" x2="1120" y2="210" stroke="#C4E4F2" stroke-width="1" stroke-dasharray="5,7"/>
  <line x1="80" y1="255" x2="1120" y2="255" stroke="#C4E4F2" stroke-width="1" stroke-dasharray="5,7"/>
  <line x1="80" y1="300" x2="1120" y2="300" stroke="#C4E4F2" stroke-width="1" stroke-dasharray="5,7"/>

  <!-- Y-axis labels -->
  <text x="56" y="168" font-size="10" fill="#5BB5D8" text-anchor="end" font-weight="500">HIGH</text>
  <text x="56" y="213" font-size="10" fill="#5BB5D8" text-anchor="end" font-weight="500">MID+</text>
  <text x="56" y="258" font-size="10" fill="#5BB5D8" text-anchor="end" font-weight="500">MID</text>
  <text x="56" y="303" font-size="10" fill="#5BB5D8" text-anchor="end" font-weight="500">BASE</text>

  <!-- Area fill -->
  <defs>
    <linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BB5D8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5BB5D8" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path d="M 100,300 C 240,300 310,230 450,170 C 590,110 660,155 760,190 C 860,225 940,155 1100,168 L 1120,168 L 1120,340 L 80,340 Z"
        fill="url(#areaG)"/>

  <!-- Main bezier wave -->
  <path d="M 100,300 C 240,300 310,230 450,170 C 590,110 660,155 760,190 C 860,225 940,155 1100,168"
        fill="none" stroke="#5BB5D8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Dot 1 — 2020 baseline -->
  <circle cx="100" cy="300" r="7" fill="white" stroke="#5BB5D8" stroke-width="2.5"/>
  <text x="100" y="303.5" font-size="8" fill="#5BB5D8" font-weight="700" text-anchor="middle">1</text>

  <!-- Dot 2 — 2021 surge -->
  <circle cx="350" cy="210" r="7" fill="white" stroke="#5BB5D8" stroke-width="2.5"/>
  <text x="350" y="213.5" font-size="8" fill="#5BB5D8" font-weight="700" text-anchor="middle">2</text>

  <!-- Dot 3 — 2022 peak (orange) -->
  <circle cx="530" cy="155" r="8" fill="white" stroke="#E8622A" stroke-width="2.5"/>
  <text x="530" y="158.5" font-size="8" fill="#E8622A" font-weight="700" text-anchor="middle">3</text>

  <!-- Dot 4 — 2023 correction -->
  <circle cx="760" cy="190" r="7" fill="white" stroke="#5BB5D8" stroke-width="2.5"/>
  <text x="760" y="193.5" font-size="8" fill="#5BB5D8" font-weight="700" text-anchor="middle">4</text>

  <!-- Dot 5 — 2024-25 now (filled) -->
  <circle cx="1100" cy="168" r="9" fill="#5BB5D8" stroke="white" stroke-width="2.5"/>
  <text x="1100" y="172" font-size="10" fill="white" font-weight="700" text-anchor="middle">↑</text>

  <!-- X-axis year labels -->
  <text x="100" y="370" font-size="12" fill="#5BB5D8" text-anchor="middle" font-weight="500">2020</text>
  <text x="350" y="370" font-size="12" fill="#5BB5D8" text-anchor="middle" font-weight="500">2021</text>
  <text x="530" y="370" font-size="12" fill="#E8622A" text-anchor="middle" font-weight="500">2022 Peak</text>
  <text x="760" y="370" font-size="12" fill="#5BB5D8" text-anchor="middle" font-weight="500">2023</text>
  <text x="1100" y="370" font-size="12" fill="#5BB5D8" text-anchor="middle" font-weight="500">2024–25 ↑</text>

  <!-- Stat row bottom -->
  <rect x="40" y="390" width="268" height="70" fill="white" rx="12" stroke="#C4E4F2"/>
  <rect x="318" y="390" width="268" height="70" fill="white" rx="12" stroke="#C4E4F2"/>
  <rect x="596" y="390" width="268" height="70" fill="white" rx="12" stroke="#C4E4F2"/>
  <rect x="874" y="390" width="286" height="70" fill="white" rx="12" stroke="#C4E4F2"/>

  <!-- Stat 1 -->
  <rect x="52" y="398" width="52" height="16" rx="8" fill="#5BB5D8"/>
  <text x="78" y="409" font-size="9" fill="white" text-anchor="middle" font-weight="700">MEDIAN</text>
  <text x="174" y="426" font-size="22" fill="#909090" font-weight="800" text-anchor="middle">[DATA]</text>
  <text x="174" y="446" font-size="11" fill="#909090" text-anchor="middle">Sale Price · Portland Metro</text>

  <!-- Stat 2 -->
  <rect x="330" y="398" width="36" height="16" rx="8" fill="#5BB5D8"/>
  <text x="348" y="409" font-size="9" fill="white" text-anchor="middle" font-weight="700">AVG</text>
  <text x="452" y="426" font-size="22" fill="#909090" font-weight="800" text-anchor="middle">[DATA]</text>
  <text x="452" y="446" font-size="11" fill="#909090" text-anchor="middle">Days on Market</text>

  <!-- Stat 3 -->
  <rect x="608" y="398" width="56" height="16" rx="8" fill="#5BB5D8"/>
  <text x="636" y="409" font-size="9" fill="white" text-anchor="middle" font-weight="700">PER SQ FT</text>
  <text x="730" y="426" font-size="22" fill="#909090" font-weight="800" text-anchor="middle">[DATA]</text>
  <text x="730" y="446" font-size="11" fill="#909090" text-anchor="middle">Price · Portland Metro</text>

  <!-- Stat 4 -->
  <rect x="886" y="398" width="36" height="16" rx="8" fill="#5BB5D8"/>
  <text x="904" y="409" font-size="9" fill="white" text-anchor="middle" font-weight="700">YoY</text>
  <text x="1017" y="426" font-size="22" fill="#909090" font-weight="800" text-anchor="middle">[DATA]%</text>
  <text x="1017" y="446" font-size="11" fill="#909090" text-anchor="middle">Year-Over-Year Change</text>

  <!-- Source note -->
  <text x="1160" y="473" font-size="10" fill="#5BB5D8" text-anchor="end" opacity="0.6">Source: RMLS · [CLIENT TO PROVIDE DATA]</text>
</svg>
